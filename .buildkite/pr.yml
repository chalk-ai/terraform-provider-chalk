on:
  pull_request: {}
  push: {}

steps:
  - label: ":terraform: PR Validation"
    command: |
      set -euo pipefail

      # Configure Go cache on persistent volume
      export GOMODCACHE=/go-cache/mod
      export GOCACHE=/go-cache/build
      sudo mkdir -p "$$GOMODCACHE" "$$GOCACHE"
      sudo chown -R "$$(id -u):$$(id -g)" /go-cache

      # Install Go 1.26 if needed
      GO_VERSION=1.26.0
      GO_INSTALL_DIR=/go-cache/go-$${GO_VERSION}
      if [ ! -x "$$GO_INSTALL_DIR/bin/go" ]; then
        echo "--- :golang: Installing Go $${GO_VERSION}"
        curl -fsSL "https://go.dev/dl/go$${GO_VERSION}.linux-amd64.tar.gz" | tar -C /go-cache -xzf -
        mv /go-cache/go "$$GO_INSTALL_DIR"
      fi
      export PATH="$$GO_INSTALL_DIR/bin:$$PATH"
      go version

      echo "--- :golang: Downloading dependencies"
      go mod download
      go mod verify

      echo "--- :golang: Building provider"
      go build -v .
      # upload to GCS so the e2e pipeline can test against this exact commit
      gcloud storage cp terraform-provider-chalk "gs://chalk-ci-binary-cache/terraform-provider-chalk/$${BUILDKITE_COMMIT}/terraform-provider-chalk"

      echo "--- :golang: Running go vet"
      go vet ./...

      echo "--- :golang: Checking go fix"
      go fix ./...
      if [ -n "$$(git diff --name-only)" ]; then
        echo "go fix made changes. Please run 'go fix ./...' locally."
        git --no-pager diff
        exit 1
      fi

      echo "--- :golang: Running staticcheck"
      go tool staticcheck ./...

      echo "--- :golang: Checking formatting"
      if [ -n "$$(gofmt -s -l .)" ]; then
        echo "Go files are not formatted. Please run 'gofmt -s -w .'"
        gofmt -s -d .
        exit 1
      fi

      echo "--- :terraform: Installing Terraform for tests"
      TERRAFORM_VERSION=1.14.7
      TERRAFORM_DIR=/go-cache/terraform-$${TERRAFORM_VERSION}
      if [ ! -x "$$TERRAFORM_DIR/terraform" ]; then
        mkdir -p "$$TERRAFORM_DIR"
        curl -fsSL "https://releases.hashicorp.com/terraform/$${TERRAFORM_VERSION}/terraform_$${TERRAFORM_VERSION}_linux_amd64.zip" -o /tmp/terraform.zip
        unzip -o /tmp/terraform.zip -d "$$TERRAFORM_DIR"
        rm /tmp/terraform.zip
      fi
      export TF_ACC_TERRAFORM_PATH="$$TERRAFORM_DIR/terraform"
      export PATH="$$TERRAFORM_DIR:$$PATH"

      echo "--- :golang: Running tests"
      go run gotest.tools/gotestsum --format testname -- ./internal/provider/... -shuffle=on -count=1 -timeout 5m

      echo "--- :terraform: Checking for docs drift"
      go generate ./tools/...
      if [ -n "$$(git status --porcelain)" ]; then
        echo "Docs are out of date. Please run 'make docs'."
        git --no-pager diff
        git --no-pager status
        exit 1
      fi

      echo "--- :white_check_mark: All checks passed!"
    agents:
      queue: default
    timeout_in_minutes: 5
    retry:
      automatic:
        - exit_status: -1
          limit: 2
        - exit_status: 255
          limit: 2

  - wait: ~

  - trigger: chalk-terraform-provider-e2e-smoke
    label: ":terraform: E2E Smoke Test"
    build:
      env:
        PROVIDER_COMMIT: "$BUILDKITE_COMMIT"
